### model
model_name_or_path: /home/cs22-hongly/VLN/checkpoints/Qwen3-VL-2B-Instruct
image_max_pixels: 65536
video_max_pixels: 16384
trust_remote_code: true

### methodimage.png
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 64
lora_alpha: 128
lora_dropout: 0.05
lora_target: all
freeze_vision_tower: true 
freeze_multi_modal_projector: true 
freeze_language_model: false
deepspeed: examples/deepspeed/ds_z3_config.json

### dataset
dataset_dir: /mnt/share172/cs22-hongly/DATACENTER/VLN_DATA/trajectory_data
dataset: R2R
template: qwen3_vl
cutoff_len: 10240
drop_exceeding_cutoff: true
# neat_packing: true
# packing: false
max_samples: 400000
preprocessing_num_workers: 32
dataloader_num_workers: 8
#lazy map dataset
lazy_map_dataset: true
### output
output_dir: /home/cs22-hongly/VLN/checkpoints/Qwen3-VL-2B_lora_random_10k
# logging_dir: /home/cs22-hongly/VLN/checkpoints/Qwen3-VL-2B_lora_/logs
logging_steps: 10
# save_steps: 500
save_strategy: epoch
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: none  # choices: [none, wandb, tensorboard, swanlab, mlflow]

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 3.0e-5
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null

# flash attention 
flash_attn: fa2


